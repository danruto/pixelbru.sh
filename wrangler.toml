name = 'pixelbrush'
compatibility_date = "2024-12-01"

[assets]
directory = "out"

[[routes]]
pattern = "pixelbru.sh"
custom_domain = true

[[routes]]
pattern = "www.pixelbru.sh"
custom_domain = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
